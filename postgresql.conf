# =====================================================================
# TiendaDB v1.0 — postgresql.conf
# Intentionally misconfigured for the PgGuardian project.
# H13, H14, H15, H16 are set here.
# =====================================================================

# Connection settings
listen_addresses = '*'
max_connections = 100
port = 5432

# ---------------------------------------------------------------------
# H13: shared_buffers too low for dataset size (~150 MB base, ~2 GB large)
# Best practice: 25% of available RAM. Default container has more available.
# ---------------------------------------------------------------------
shared_buffers = 128MB

# ---------------------------------------------------------------------
# H14: work_mem too low — causes sorts to spill to disk
# Should be at least 32-64 MB for the kind of report queries TiendaDB runs.
# ---------------------------------------------------------------------
work_mem = 4MB

# Maintenance memory
maintenance_work_mem = 64MB

# ---------------------------------------------------------------------
# H15: pg_stat_statements loaded but max too low to capture full workload
# Detector should flag this as misconfig.
# ---------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 100
pg_stat_statements.track = 'top'

# ---------------------------------------------------------------------
# H16: log_min_duration_statement disabled — slow queries are NOT logged
# Detector should flag the absence of slow query logging.
# ---------------------------------------------------------------------
log_min_duration_statement = -1
log_connections = off
log_disconnections = off
log_statement = 'none'
log_destination = 'stderr'

# Other sane defaults
random_page_cost = 4.0
effective_cache_size = 256MB
checkpoint_completion_target = 0.9
wal_buffers = 4MB

# Timezone
log_timezone = 'America/Mexico_City'
timezone = 'America/Mexico_City'

# Locale
datestyle = 'iso, mdy'
default_text_search_config = 'pg_catalog.english'
