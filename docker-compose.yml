# =====================================================================
# TiendaDB v1.0 — Docker Compose
# E-commerce demo database for PgGuardian project (SIS2404)
#
# Usage:
#   docker compose up -d           # Start the database
#   docker compose logs -f db      # Watch the seeding progress
#   docker compose down -v         # Stop and remove all data
#
# Este documento fue modificado con ayuda de Inteligencia Artificial.
# =====================================================================

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pgguardian_tiendadb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT}:5432"
    volumes:
      # Init scripts run in alphabetical order on first start
      - ./init:/docker-entrypoint-initdb.d:ro
      # Custom postgresql.conf with planted misconfigs (H13-H16)
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      # Data persistence
      - tienda_data:/var/lib/postgresql/data
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # H17: Long-running idle-in-transaction connection (planted problem)
  idle_tx:
    image: postgres:16
    container_name: tiendadb_idle_tx
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    command: bash /scripts/start_idle_tx.sh
    environment:
      PGHOST: db
      PGPORT: 5432

  api: 
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: pgguardian_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pgguardian_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api
    
volumes:
  tienda_data:
    name: tiendadb_data
